name: Bug report
description: Report a reproducible Codex Deck problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include tokens, accounts.json, auth.json, email addresses, task titles, or unredacted screenshots."
  - type: input
    id: version
    attributes:
      label: Codex Deck version
      placeholder: 0.1.23
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include concise reproduction steps and the expected result.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted diagnostics
      description: Remove personal data, local paths, credentials, and task content.

